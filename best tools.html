<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Best Tool</title>
  <style>
    body {
      background-color: orange;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: #000;
    }
    h1 {
      text-align: center;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-top: 20px;
    }
    .product {
      background: white;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      box-shadow: 2px 2px 10px #aaa;
    }
    .product img {
      width: 100%;
      height: 150px;
      object-fit: contain;
    }
    .cart {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px #00000033;
    }
    button {
      background-color: #ff6600;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Best Tool</h1>

  <div class="cart">
    🛒 Items: <span id="cart-count">0</span><br>
    💰 Total: $<span id="cart-total">0.00</span>
  </div>

  <div class="products" id="product-list">
    <!-- Products will load here -->
  </div
  
  <div class="order-form">
    <h2>Submit Your Order</h2>
    <form id="orderForm">
      <label>Name:</label>
      <input type="text" id="name" required>
      <label>Email:</label>
      <input type="email" id="email" required>
      <button type="submit">Submit Order</button>
    </form>
  </div>

  <script>
    const products = [
      { name: "Hammer", price: 12.99, img: "https://images.unsplash.com/photo-1490557162706-284736f48784?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzF8fGhhbW1lcnxlbnwwfHwwfHx8MA%3D%3D" },
      { name: "Screwdriver", price: 7.49, img: "https://images.unsplash.com/photo-1645639554326-6d738cf1695b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fHNjcmV3ZHJpdmVyfGVufDB8fDB8fHww" },
      { name: "Wrench", price: 9.99, img: "https://plus.unsplash.com/premium_photo-1722988826060-23bd68cea213?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8d3JlbmNofGVufDB8fDB8fHww" },
      { name: "Pliers", price: 8.50, img: "https://images.unsplash.com/photo-1534398079543-7ae6d016b86a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cGxpZXJzfGVufDB8fDB8fHww" },
      { name: "Drill", price: 45.00, img: "https://images.unsplash.com/photo-1540104539488-92a51bbc0410?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzB8fGRyaWxsc3xlbnwwfHwwfHx8MA%3D%3D" },
      { name: "Saw", price: 15.00, img: "https://images.unsplash.com/photo-1687818800037-325ba3b2752a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c2F3c3xlbnwwfHwwfHx8MA%3D%3D" },
      { name: "Tape Measure", price: 5.00, img: "https://images.unsplash.com/photo-1559647746-9b2f216d2dc3?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fHRhcGUlMjBtZWFzdXJlfGVufDB8fDB8fHww" },
      { name: "Chisel", price: 6.75, img: "https://images.unsplash.com/photo-1641893961390-2a76f05db7e9?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2hpc2VsfGVufDB8fDB8fHww" },
      { name: "Toolbox", price: 20.00, img: "https://plus.unsplash.com/premium_photo-1683140705462-11ed388653cf?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8dG9vbGJveHxlbnwwfHwwfHx8MA%3D%3D" },
      { name: "Level", price: 11.25, img: "https://plus.unsplash.com/premium_photo-1682974359961-5a4b36d53633?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjV8fGxldmVsfGVufDB8fDB8fHww" }
    ];

    let cartCount = 0;
    let cartTotal = 0;

    function addToCart(price) {
      cartCount++;
      cartTotal += price;
      document.getElementById("cart-count").innerText = cartCount;
      document.getElementById("cart-total").innerText = cartTotal.toFixed(2);
    }

    function renderProducts() {
      const container = document.getElementById("product-list");
      products.forEach(product => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
          <img src="${product.img}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>$${product.price.toFixed(2)}</p>
          <button onclick="addToCart(${product.price})">Add to Cart</button>
        `;
        container.appendChild(div);
      });
    }

    renderProducts();
  </script>
</body>
</html>
